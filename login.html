<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --light-cream: #F1EFEC;
            --warm-tan: #D4C9BE;
            --deep-navy: #123458;
            --rich-black: #030303;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, var(--deep-navy) 0%, var(--rich-black) 100%);
            color: var(--light-cream);
            overflow: hidden;
        }

        .wrap {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated background elements */
        .bg-accent {
            position: fixed;
            border-radius: 50%;
            opacity: 0.05;
            z-index: 0;
            pointer-events: none;
        }

        .accent-1 {
            width: 300px;
            height: 300px;
            background: var(--warm-tan);
            top: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .accent-2 {
            width: 200px;
            height: 200px;
            background: var(--light-cream);
            bottom: -80px;
            left: -80px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .card {
            background: rgba(18, 52, 88, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid var(--warm-tan);
            padding: 48px 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
            color: var(--light-cream);
            text-transform: uppercase;
            letter-spacing: -0.5px;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.1s both;
        }

        .subtitle {
            font-size: 14px;
            color: var(--warm-tan);
            margin-bottom: 28px;
            opacity: 0.9;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s both;
        }

        form {
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s both;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--warm-tan);
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type=password] {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 6px;
            border-radius: 6px;
            border: 1px solid var(--warm-tan);
            background: rgba(212, 201, 190, 0.08);
            color: var(--light-cream);
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type=password]:focus {
            outline: none;
            border-color: var(--light-cream);
            background: rgba(212, 201, 190, 0.12);
            box-shadow: 0 0 12px rgba(241, 239, 236, 0.2);
        }

        input[type=password]::placeholder {
            color: rgba(212, 201, 190, 0.6);
        }

        .error {
            color: #ff9999;
            font-size: 12px;
            height: 18px;
            margin-bottom: 12px;
            opacity: 0;
            animation: slideDown 0.3s ease forwards;
            font-weight: 500;
        }

        .error.show {
            animation: slideDown 0.3s ease forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button {
            width: 100%;
            padding: 12px 16px;
            margin-top: 8px;
            border-radius: 6px;
            border: 2px solid var(--warm-tan);
            background: var(--warm-tan);
            color: var(--deep-navy);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--light-cream);
            box-shadow: 0 8px 20px rgba(212, 201, 190, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(212, 201, 190, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .note {
            font-size: 12px;
            color: var(--warm-tan);
            margin-top: 20px;
            text-align: center;
            opacity: 0.8;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.4s both;
        }

        .line {
            width: 60px;
            height: 3px;
            background: var(--warm-tan);
            margin: 12px auto 0;
            border-radius: 2px;
            opacity: 0.6;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.15s both;
        }
    </style>
</head>
<body>
    <div class="bg-accent accent-1"></div>
    <div class="bg-accent accent-2"></div>

    <div class="wrap">
        <div class="card">
            <h1>HALOOO BU DEWI</h1>
            <p class="subtitle">Passwordnya kaya biasa ya Bu Dewi...</p>
            <form id="loginForm">
                <label for="pwd">Password</label>
                <input id="pwd" type="password" autocomplete="current-password" required placeholder="●●●●●●●●" />
                <div class="error" id="err"></div>
                <button type="submit">Masuk</button>
            </form>
            <div class="note"></div>
        </div>
    </div>

    <script>
        (function(){
            const PASSWORD = '19760403';
            const form = document.getElementById('loginForm');
            const pwd = document.getElementById('pwd');
            const err = document.getElementById('err');

            form.addEventListener('submit', function(e){
                e.preventDefault();
                err.textContent = '';
                if (pwd.value === PASSWORD) {
                    try { sessionStorage.setItem('loggedIn','true'); } catch (e) {}
                    // Redirect back to index.html
                    location.replace('index.html');
                } else {
                    err.textContent = 'Password salah.';
                    pwd.value = '';
                    pwd.focus();
                }
            });

            // If already logged in, go to index
            try {
                if (sessionStorage.getItem('loggedIn') === 'true') {
                    location.replace('index.html');
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
